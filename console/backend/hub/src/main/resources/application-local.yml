# Spark LLM 配置（讯飞开放平台）
spark:
  app-id: ${common.appid}
  api-key: ${common.apiKey}
  api-secret: ${common.apiSecret}
  api:
    password: ${common.apiPassword}
  rtasr-appId: ${SPARK_RTASR_APPID:f740451b}
  rtasr-key: ${SPARK_RTASR_KEY:your-rtasr-key}
  image-appId: ${common.imgAppid}
